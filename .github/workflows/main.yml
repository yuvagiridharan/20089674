name: Build and Test All Tasks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  task01-churros:
    name: Task01 - Churros Truck App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Task01
        run: dotnet restore que01/churrosapp/churrosapp.csproj

      - name: Build Task01
        run: dotnet build que01/churrosapp/churrosapp.csproj --no-restore

      - name: Run Task01
        run: |
          cd que01/churrosapp
          echo -e "1\n1\n1\n2\n0" | dotnet run --no-build
        continue-on-error: true

  task02-periodic-table:
    name: Task02 - Periodic Table App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Restore Task02
        run: dotnet restore que02/Periodictable/Periodictable.csproj

      - name: Build Task02
        run: dotnet build que02/Periodictable/Periodictable.csproj --no-restore

      - name: Run Task02
        run: |
          cd que02/Periodictable
          echo -e "1\nn" | dotnet run --no-build
        continue-on-error: true

  task03-rental-car:
    name: Task03 - EasyDrive Rental Car
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install tinydb rich questionary

      - name: Check files exist
        run: |
          test -f que03/rentalcar/que03_server.py
          test -f que03/rentalcar/que03_client.py
          echo "Both files found"

      - name: Syntax check server
        run: python3 -m py_compile que03/rentalcar/que03_server.py

      - name: Syntax check client
        run: python3 -m py_compile que03/rentalcar/que03_client.py

      - name: Run server and client
        run: |
          cd que03/rentalcar
          python3 que03_server.py &
          sleep 2
          echo -e "John Smith\n123 Main Street Dublin\n1234567A\nDL123456\ny" | python3 que03_client.py
        continue-on-error: true

  task04-web-scraping:
    name: Task04 - Web Scraping
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Check file exists
        run: |
          test -f que04/webscrub/que04.py
          echo "Scraper file found"

      - name: Syntax check
        run: python3 -m py_compile que04/webscrub/que04.py

      - name: Run web scraper
        run: python3 que04/webscrub/que04.py
        continue-on-error: true